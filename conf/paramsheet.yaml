# --------------------------------------------------------------
# profiles for rnaseq analysis
# --------------------------------------------------------------
- paramset_name: rnaseq
  config_profile_name: RNA-seq profile
  config_profile_description: Base profile for RNA-seq analysis

  # data type
  study_type: rnaseq
  study_abundance_type: counts

  # column mappings
  features_type: gene
  features_id_col: gene_id
  features_name_col: gene_name
  features_metadata_cols: gene_id,gene_name,gene_biotype
  differential_feature_id_column: gene_id
  differential_feature_name_column: gene_name

  # observation mappings
  observations_id_col: sample
  observations_name_col: sample

# rnaseq analysis with deseq2
- paramset_name: deseq2_rnaseq
  include: paramsheet/rnaseq
  config_profile_name: RNA-seq profile with DESeq2
  config_profile_description: RNA-seq profile using DESeq2 for differential expression analysis

  # DE method
  differential_method: deseq2

  # exploratory settings
  exploratory_assay_names: raw,normalised,variance_stabilised
  exploratory_final_assay: variance_stabilised
  exploratory_log2_assays: raw,normalised

  # differential settings
  differential_file_suffix: ".deseq2.results.tsv"
  differential_fc_column: log2FoldChange
  differential_pval_column: pvalue
  differential_qval_column: padj

# rnaseq analysis with deseq2 and gsea
- paramset_name: deseq2_rnaseq_gsea
  include: paramsheet/deseq2_rnaseq
  config_profile_name: RNA-seq profile with DESeq2 and GSEA
  config_profile_description: RNA-seq profile using DESeq2 for differential expression analysis and GSEA for functional analysis
  functional_method: gsea

# rnaseq analysis with deseq2 and gprofiler2
- paramset_name: deseq2_rnaseq_gprofiler2
  include: paramsheet/deseq2_rnaseq
  config_profile_name: RNA-seq profile with DESeq2 and g:Profiler2
  config_profile_description: RNA-seq profile using DESeq2 for differential expression analysis and g:Profiler2 for functional analysis
  functional_method: gprofiler2

# rnaseq analysis with limma voom
- paramset_name: limma_rnaseq
  include: paramsheet/rnaseq
  config_profile_name: RNA-seq profile with limma-voom
  config_profile_description: RNA-seq profile using limma-voom for differential expression analysis

  # DE method
  differential_method: limma
  limma_use_voom: true

  # exploratory settings
  exploratory_assay_names: raw,normalised
  exploratory_final_assay: normalised
  exploratory_log2_assays: raw,normalised

  # differential settings
  differential_file_suffix: ".limma.results.tsv"
  differential_fc_column: logFC
  differential_pval_column: P.Value
  differential_qval_column: adj.P.Val

# rnaseq analysis with limma voom and gsea
- paramset_name: limma_rnaseq_gsea
  include: paramsheet/limma_rnaseq
  config_profile_name: RNA-seq profile with limma-voom and GSEA
  config_profile_description: RNA-seq profile using limma-voom for differential expression analysis and GSEA for functional analysis
  functional_method: gsea

# rnaseq analysis with limma voom and gprofiler2
- paramset_name: limma_rnaseq_gprofiler2
  include: paramsheet/limma_rnaseq
  config_profile_name: RNA-seq profile with limma-voom and g:Profiler2
  config_profile_description: RNA-seq profile using limma-voom for differential expression analysis and g:Profiler2 for functional analysis
  functional_method: gprofiler2

# rnaseq analysis with limma voom and decoupler
- paramset_name: limma_rnaseq_decoupler
  include: paramsheet/limma_rnaseq
  config_profile_name: RNA-seq profile with limma-voom and Decoupler
  config_profile_description: RNA-seq profile using limma-voom for differential expression analysis and Decoupler for functional analysis
  functional_method: decoupler

# rnaseq analysis with dream
- paramset_name: dream_rnaseq
  include: paramsheet/rnaseq
  config_profile_name: RNA-seq profile with dream
  config_profile_description: RNA-seq profile using dream for differential expression analysis

  # DE method
  differential_method: dream

  # exploratory settings
  exploratory_assay_names: raw,normalised
  exploratory_final_assay: normalised
  exploratory_log2_assays: raw,normalised

  # differential settings
  differential_file_suffix: ".dream.results.tsv"
  differential_fc_column: logFC
  differential_pval_column: P.Value
  differential_qval_column: adj.P.Val

# --------------------------------------------------------------
# profiles for affy array analysis
# --------------------------------------------------------------

# affy array analysis with limma
- paramset_name: limma_affy
  config_profile_name: Affy array profile with limma
  config_profile_description: Affy array analysis using limma for differential expression analysis

  # DE method
  differential_method: limma

  # data type
  study_type: affy_array
  study_abundance_type: intensities

  # features mappings
  features_id_col: PROBEID
  features_metadata_cols: PROBEID,ENSEMBL,SYMBOL,GENETYPE
  features_name_col: SYMBOL

  # exploratory settings
  exploratory_assay_names: raw,normalised
  exploratory_final_assay: normalised
  exploratory_log2_assays: null

  # differential settings
  differential_file_suffix: ".limma.results.tsv"
  differential_fc_column: logFC
  differential_pval_column: P.Value
  differential_qval_column: adj.P.Val
  differential_feature_id_column: PROBEID
  differential_feature_name_column: SYMBOL

# affy array analysis with limma and gsea
- paramset_name: limma_affy_gsea
  config_profile_name: Affy array profile with limma and GSEA
  config_profile_description: Affy array analysis using limma for differential expression analysis and GSEA for functional analysis
  include: paramsheet/limma_affy
  functional_method: gsea

# affy array analysis with limma and gprofiler2
- paramset_name: limma_affy_gprofiler2
  config_profile_name: Affy array profile with limma and g:Profiler2
  config_profile_description: Affy array analysis using limma for differential expression analysis and g:Profiler2 for functional analysis
